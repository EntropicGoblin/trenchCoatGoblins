services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: tcg-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    networks:
      - tcg-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: tcg-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - tcg-network

networks:
  tcg-network:
    driver: bridge
